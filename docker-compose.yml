services:
  postgres:
    image: postgres:17
    restart: always

    env_file:
      - .env.docker

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-flowboard:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile

    depends_on:
      - postgres

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

  frontend-flowboard:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile

    depends_on:
      - backend-flowboard

    ports:
      - "5173:80"

volumes:
  postgres_data:
